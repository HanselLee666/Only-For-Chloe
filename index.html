<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Congratulations, Chloe!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&family=Great+Vibes&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow-x: hidden;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    #login-overlay, #letter {
      position: relative;
      z-index: 10;
    }

    /* LOGIN OVERLAY */
    #login-overlay {
      position: fixed;
      inset: 0;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 2rem;
    }

    @keyframes loginFadeIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-box {
      background: rgba(10, 4, 30, 0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      max-width: 360px;
      width: 100%;
      padding: 2.5rem 1.8rem;
      border-radius: 20px;
      border: 1px solid rgba(180, 130, 255, 0.25);
      box-shadow: 0 0 60px rgba(140, 60, 255, 0.15), 0 0 0 1px rgba(255,255,255,0.04);
      text-align: center;
      animation: loginFadeIn 0.8s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    .login-icon {
      font-size: 48px;
      margin-bottom: 1rem;
      display: block;
      filter: drop-shadow(0 0 12px rgba(200,160,255,0.6));
    }

    .login-deco {
      color: rgba(200, 160, 255, 0.5);
      font-size: 13px;
      letter-spacing: 0.35em;
      margin-bottom: 1.2rem;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
    }

    .login-title {
      font-size: 26px;
      font-style: italic;
      color: #fff;
      margin-bottom: 0.4rem;
      text-shadow: 0 0 20px rgba(200,160,255,0.4);
    }

    .login-sub {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: rgba(200, 180, 230, 0.6);
      margin-bottom: 1rem;
      letter-spacing: 0.02em;
    }

    .login-hint {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: rgba(180, 220, 255, 0.45);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(180,150,255,0.15);
      border-radius: 8px;
      padding: 0.5rem 0.85rem;
      margin-bottom: 1.8rem;
      letter-spacing: 0.01em;
      line-height: 1.5;
    }

    .login-box input[type="password"] {
      width: 100%;
      padding: 0.8rem 1rem;
      font-size: 22px;
      font-family: 'Inter', sans-serif;
      border: 1px solid rgba(180,130,255,0.3);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      text-align: center;
      letter-spacing: 0.4em;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      margin-bottom: 1rem;
    }

    .login-box input[type="password"]::placeholder { color: rgba(255,255,255,0.2); }

    .login-box input[type="password"]:focus {
      border-color: rgba(200,150,255,0.7);
      box-shadow: 0 0 18px rgba(180,100,255,0.25);
    }

    .login-btn {
      width: 100%;
      padding: 0.8rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, rgba(160,80,255,0.8), rgba(80,160,255,0.7));
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(140,60,255,0.3);
    }

    .login-btn:hover  { opacity: 0.88; }
    .login-btn:active { transform: scale(0.97); }

    .login-error {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: rgba(255,140,140,0.9);
      margin-top: 0.85rem;
      min-height: 18px;
    }

    /* LETTER */
    #letter {
      display: none;
      padding: 0.5rem;
    }

    @keyframes zoomIn {
      0% { opacity: 0; transform: scale(0.6); }
      70% { transform: scale(1.03); }
      100% { opacity: 1; transform: scale(1); }
    }

    #letter.visible {
      display: flex;
      justify-content: center;
      animation: zoomIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .paper {
      background:
        radial-gradient(ellipse at 20% 10%, rgba(255,235,200,0.55) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(255,210,230,0.35) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 40%, rgba(230,220,255,0.2) 0%, transparent 45%),
        linear-gradient(160deg, #fdf8ef 0%, #fef9f2 40%, #fdf4f8 100%);
      max-width: 700px;
      width: 100%;
      padding: 2.5rem 1.6rem;
      border-radius: 16px;
      box-shadow:
        0 0 0 1px rgba(200,160,100,0.25),
        0 0 30px rgba(180,120,255,0.12),
        0 8px 40px rgba(0,0,0,0.35),
        inset 0 0 60px rgba(255,240,210,0.3);
      position: relative;
      overflow: hidden;
    }

    /* Decorative corner flourishes */
    .paper::before, .paper::after {
      content: '❧';
      position: absolute;
      font-size: 22px;
      color: rgba(180,130,80,0.35);
      line-height: 1;
    }
    .paper::before { top: 18px; left: 22px; }
    .paper::after  { bottom: 18px; right: 22px; }

    /* Margin line — hidden on mobile */
    .paper .margin-line {
      display: none;
    }

    /* Top decorative ribbon */
    .paper .ribbon {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(200,150,255,0.4) 20%,
        rgba(150,200,255,0.4) 50%,
        rgba(255,180,220,0.4) 80%,
        transparent 100%);
      border-radius: 16px 16px 0 0;
    }

    .date {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: #b09080;
      text-align: right;
      margin-bottom: 1.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .salutation {
      font-family: 'Playfair Display', serif;
      font-size: 19px;
      font-style: italic;
      font-weight: 400;
      color: #2c2018;
      margin-bottom: 1.4rem;
      letter-spacing: 0.01em;
    }

    p {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 15px;
      line-height: 1.9;
      color: #3a2e28;
      margin-bottom: 1.2rem;
      letter-spacing: 0.012em;
      text-align: justify;
      hyphens: auto;
    }

    p:first-of-type::first-letter {
      font-family: 'Playfair Display', serif;
      font-size: 4em;
      font-weight: 700;
      color: #7a4a9a;
      float: left;
      line-height: 0.78;
      padding-right: 0.1em;
      padding-top: 0.06em;
      text-shadow: 1px 1px 0 rgba(140,80,200,0.15);
    }

    .closing { margin-top: 2rem; }

    .closing p {
      margin-bottom: 0.3rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 15px;
      font-weight: 300;
      color: #5a4535;
      letter-spacing: 0.02em;
    }

    .signature {
      font-family: 'Great Vibes', cursive;
      font-size: 72px;
      font-weight: 400;
      color: #6a3890;
      margin-top: 0.3rem;
      font-style: normal;
      text-shadow: 0 1px 8px rgba(150,80,220,0.2), 0 0 20px rgba(180,120,255,0.15);
      letter-spacing: 0.02em;
    }

    .decoration {
      text-align: center;
      margin-bottom: 2rem;
      color: #c9a87a;
      font-size: 14px;
      letter-spacing: 0.8em;
      opacity: 0.7;
    }

    /* Subtle ruled lines */
    .paper-content {
      position: relative;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .tw-cursor {
      display: inline-block;
      width: 1.5px;
      height: 1em;
      background: #c9a87a;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.75s step-end infinite;
    }

    .download-btn {
      display: block;
      margin: 1.8rem auto 0;
      padding: 0.7rem 1.6rem;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.07em;
      color: #6a3890;
      background: rgba(255,255,255,0.6);
      border: 1.5px solid rgba(160,100,220,0.35);
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(160,100,220,0.1);
      text-decoration: none;
    }
    .download-btn:hover {
      background: rgba(255,255,255,0.85);
      border-color: rgba(160,100,220,0.6);
      box-shadow: 0 4px 18px rgba(160,100,220,0.2);
    }
    .download-btn:active { transform: scale(0.97); }
  </style>
</head>
